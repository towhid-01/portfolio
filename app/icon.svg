<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Purple to Cyan gradient -->
    <linearGradient id="mainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a855f7"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
    
    <!-- Glow filter -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Dark background with rounded corners -->
  <rect width="512" height="512" rx="100" fill="#0f0a1f"/>
  
  <!-- Gradient border -->
  <rect x="12" y="12" width="488" height="488" rx="90" fill="none" stroke="url(#mainGrad)" stroke-width="6"/>
  
  <!-- Code bracket left < -->
  <path d="M 100 256 L 160 180 L 175 195 L 130 256 L 175 317 L 160 332 Z" fill="url(#mainGrad)" opacity="0.7"/>
  
  <!-- Code bracket right > -->
  <path d="M 412 256 L 352 180 L 337 195 L 382 256 L 337 317 L 352 332 Z" fill="url(#mainGrad)" opacity="0.7"/>
  
  <!-- Main TS text -->
  <text x="256" y="295" font-family="Arial Black, Helvetica, sans-serif" font-size="175" font-weight="900" fill="white" text-anchor="middle" filter="url(#glow)">TS</text>
  
  <!-- Gamepad icon at bottom -->
  <g transform="translate(196, 370)">
    <!-- Controller body -->
    <rect x="20" y="10" width="80" height="35" rx="17" fill="url(#mainGrad)"/>
    <!-- Left grip -->
    <ellipse cx="30" cy="38" rx="15" ry="22" fill="url(#mainGrad)"/>
    <!-- Right grip -->
    <ellipse cx="90" cy="38" rx="15" ry="22" fill="url(#mainGrad)"/>
    <!-- D-pad horizontal -->
    <rect x="38" y="22" width="16" height="5" rx="1" fill="#0f0a1f"/>
    <!-- D-pad vertical -->
    <rect x="43" y="17" width="6" height="15" rx="1" fill="#0f0a1f"/>
    <!-- Button 1 -->
    <circle cx="75" cy="22" r="4" fill="#0f0a1f"/>
    <!-- Button 2 -->
    <circle cx="85" cy="30" r="4" fill="#0f0a1f"/>
  </g>
  
  <!-- Pixel accents for gaming vibe -->
  <rect x="60" y="60" width="15" height="15" fill="#a855f7" opacity="0.8"/>
  <rect x="78" y="78" width="10" height="10" fill="#06b6d4" opacity="0.6"/>
  <rect x="437" y="60" width="15" height="15" fill="#06b6d4" opacity="0.8"/>
  <rect x="424" y="78" width="10" height="10" fill="#a855f7" opacity="0.6"/>
  
  <!-- Bottom pixels -->
  <rect x="60" y="437" width="15" height="15" fill="#06b6d4" opacity="0.6"/>
  <rect x="437" y="437" width="15" height="15" fill="#a855f7" opacity="0.6"/>
</svg>
